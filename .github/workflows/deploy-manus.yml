name: Deploy to Manus Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build project
        run: pnpm run build

      - name: Verify build output
        run: |
          if [ -d "dist/public" ]; then
            echo "✅ Build successful"
            echo "📦 Build artifacts ready at dist/public"
            ls -lah dist/public/ | head -10
          else
            echo "❌ Build failed - dist/public not found"
            exit 1
          fi

      - name: Notify deployment
        if: success()
        run: |
          echo "✅ Build successful and ready for deployment"
          echo "🚀 Manus will auto-deploy this build via webhook"
          echo "🌐 Site: https://haala.io"
